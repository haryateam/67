<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>67 Хаос</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: black;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
        /* Затемняющий слой-ловушка для кликов по всему экрану */
        .click-catcher {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            background: transparent;
        }
        .number {
            position: absolute;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none; /* Чтобы цифры не мешали кликам */
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            transition: all 0.05s linear;
        }
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            z-index: 1001;
            cursor: pointer;
            backdrop-filter: blur(4px);
            box-shadow: 0 0 5px rgba(0,0,0,0.3);
        }
        .signature {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            z-index: 1000;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            padding: 4px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 20px;
            backdrop-filter: blur(2px);
            font-weight: normal;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>
    <!-- Прозрачный слой, который делает весь экран кликабельным -->
    <div class="click-catcher" id="clickCatcher"></div>
    
    <button id="music-control">🔇</button>
    <div class="signature">by Harya Team</div>
    <audio id="bg-music" loop preload="auto">
        <source id="music-source" src="music.mp3">
    </audio>

    <script>
        const colors = [
            '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF',
            '#FF4500', '#9400D3', '#FF1493', '#7FFF00', '#FFD700', '#8B0000',
            '#006400', '#483D8B', '#FF6347', '#40E0D0', '#EE82EE', '#F5DEB3'
        ];
        
        const fonts = [
            'Arial', 'Comic Sans MS', 'Courier New', 'Times New Roman',
            'Verdana', 'Impact', 'Tahoma', 'Georgia', 'Trebuchet MS',
            'Lucida Console', 'Algerian', 'Broadway'
        ];
        
        let labels = [];
        let animationId;
        let musicPlaying = false;
        
        function createCrazyLabels() {
            const numLabels = Math.floor(Math.random() * 20) + 20;
            for (let i = 0; i < numLabels; i++) {
                createSingleLabel();
            }
        }
        
        function createSingleLabel() {
            const size = Math.floor(Math.random() * 90) + 20;
            const font = fonts[Math.floor(Math.random() * fonts.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const div = document.createElement('div');
            div.className = 'number';
            div.textContent = '67';
            div.style.fontSize = size + 'px';
            div.style.fontFamily = font;
            div.style.color = color;
            div.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            div.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            
            document.body.appendChild(div);
            
            labels.push({
                element: div,
                size: size,
                speedX: (Math.random() - 0.5) * 3,
                speedY: (Math.random() - 0.5) * 3,
                color: color
            });
        }
        
        function animate() {
            for (let label of labels) {
                let x = parseFloat(label.element.style.left);
                let y = parseFloat(label.element.style.top);
                
                let newX = x + label.speedX;
                let newY = y + label.speedY;
                
                if (newX <= 0 || newX >= window.innerWidth - 100) {
                    label.speedX = -label.speedX;
                    randomizeLabel(label);
                    newX = Math.max(0, Math.min(window.innerWidth - 100, newX));
                }
                
                if (newY <= 0 || newY >= window.innerHeight - 100) {
                    label.speedY = -label.speedY;
                    randomizeLabel(label);
                    newY = Math.max(0, Math.min(window.innerHeight - 100, newY));
                }
                
                label.element.style.left = newX + 'px';
                label.element.style.top = newY + 'px';
                
                if (Math.random() < 0.1) {
                    randomizeLabel(label);
                }
            }
            
            if (Math.random() < 0.1 && labels.length < 60) {
                createSingleLabel();
            }
            
            if (Math.random() < 0.05 && labels.length > 15) {
                const old = labels.shift();
                old.element.remove();
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        function randomizeLabel(label) {
            const newSize = Math.floor(Math.random() * 90) + 20;
            const newFont = fonts[Math.floor(Math.random() * fonts.length)];
            const newColor = colors[Math.floor(Math.random() * colors.length)];
            
            label.element.style.fontSize = newSize + 'px';
            label.element.style.fontFamily = newFont;
            label.element.style.color = newColor;
            label.size = newSize;
            label.color = newColor;
            
            if (Math.random() < 0.3) {
                label.speedX = (Math.random() - 0.5) * 4;
                label.speedY = (Math.random() - 0.5) * 4;
            }
        }
        
        function setupMusic() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-control');
            const clickCatcher = document.getElementById('clickCatcher');
            
            function updateButtonIcon() {
                btn.textContent = musicPlaying ? '🔊' : '🔇';
            }
            
            function startMusic() {
                if (musicPlaying) return;
                
                audio.play()
                    .then(() => {
                        musicPlaying = true;
                        updateButtonIcon();
                        console.log('Музыка запущена');
                    })
                    .catch(e => {
                        console.log('Автовоспроизведение заблокировано:', e);
                        musicPlaying = false;
                        updateButtonIcon();
                    });
            }
            
            function stopMusic() {
                if (!musicPlaying) return;
                audio.pause();
                musicPlaying = false;
                updateButtonIcon();
            }
            
            // Обработчик для кнопки управления
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                if (musicPlaying) {
                    stopMusic();
                } else {
                    startMusic();
                }
            });
            
            // Обработчик для всего экрана (через прозрачный слой)
            clickCatcher.addEventListener('click', () => {
                if (!musicPlaying) {
                    startMusic();
                }
            });
            
            // Автовоспроизведение при загрузке
            startMusic();
            
            // Проверяем наличие MP3
            fetch('music.mp3', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('MP3 не найден');
                        btn.style.display = 'none';
                    }
                })
                .catch(() => {
                    console.log('MP3 не найден');
                    btn.style.display = 'none';
                });
        }
        
        window.addEventListener('resize', () => {
            for (let label of labels) {
                let x = parseFloat(label.element.style.left);
                let y = parseFloat(label.element.style.top);
                x = Math.min(x, window.innerWidth - 100);
                y = Math.min(y, window.innerHeight - 100);
                label.element.style.left = x + 'px';
                label.element.style.top = y + 'px';
            }
        });
        
        createCrazyLabels();
        animate();
        setupMusic();
    </script>
</body>
</html>
