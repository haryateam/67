<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>67 Хаос</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: black;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }
        .number {
            position: absolute;
            font-weight: bold;
            white-space: nowrap;
            pointer-events: none;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
            transition: all 0.05s linear;
        }
        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 24px;
            z-index: 1000;
            cursor: pointer;
        }
        /* Стиль для подписи */
        .signature {
            position: fixed;
            bottom: 20px;
            left: 0;
            right: 0;
            text-align: center;
            color: rgba(255,255,255,0.6);
            font-family: 'Arial', sans-serif;
            font-size: 14px;
            z-index: 1000;
            pointer-events: none;
            background: rgba(0,0,0,0.4);
            padding: 4px;
            width: fit-content;
            margin: 0 auto;
            border-radius: 20px;
            backdrop-filter: blur(2px);
            font-weight: normal;
            letter-spacing: 0.5px;
        }
        @keyframes shake {
            0% { transform: translate(0, 0); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-1px, -1px); }
            40% { transform: translate(1px, 1px); }
            50% { transform: translate(-2px, 0); }
            60% { transform: translate(2px, -1px); }
            70% { transform: translate(-1px, 2px); }
            80% { transform: translate(1px, -2px); }
            90% { transform: translate(-2px, 1px); }
            100% { transform: translate(0, 0); }
        }
    </style>
</head>
<body>
    <button id="music-control">🔇</button>
    <div class="signature">by Harya Team</div>
    <audio id="bg-music" loop preload="auto">
        <source id="music-source" src="music.mp3">
    </audio>

    <script>
        const colors = [
            '#FF0000', '#00FF00', '#0000FF', '#FFFF00', '#FF00FF', '#00FFFF',
            '#FF4500', '#9400D3', '#FF1493', '#7FFF00', '#FFD700', '#8B0000',
            '#006400', '#483D8B', '#FF6347', '#40E0D0', '#EE82EE', '#F5DEB3'
        ];
        
        const fonts = [
            'Arial', 'Comic Sans MS', 'Courier New', 'Times New Roman',
            'Verdana', 'Impact', 'Tahoma', 'Georgia', 'Trebuchet MS',
            'Lucida Console', 'Algerian', 'Broadway'
        ];
        
        let labels = [];
        let animationId;
        let musicPlaying = false;
        let autoPlayAttempted = false;
        
        // Создаем хаотичные надписи
        function createCrazyLabels() {
            const numLabels = Math.floor(Math.random() * 20) + 20; // 20-40 надписей
            
            for (let i = 0; i < numLabels; i++) {
                createSingleLabel();
            }
        }
        
        function createSingleLabel() {
            const size = Math.floor(Math.random() * 90) + 20; // 20-110px
            const font = fonts[Math.floor(Math.random() * fonts.length)];
            const color = colors[Math.floor(Math.random() * colors.length)];
            
            const div = document.createElement('div');
            div.className = 'number';
            div.textContent = '67';
            div.style.fontSize = size + 'px';
            div.style.fontFamily = font;
            div.style.color = color;
            div.style.left = Math.random() * (window.innerWidth - 100) + 'px';
            div.style.top = Math.random() * (window.innerHeight - 100) + 'px';
            
            document.body.appendChild(div);
            
            labels.push({
                element: div,
                size: size,
                speedX: (Math.random() - 0.5) * 3,
                speedY: (Math.random() - 0.5) * 3,
                color: color
            });
        }
        
        // Анимация движения
        function animate() {
            for (let label of labels) {
                let x = parseFloat(label.element.style.left);
                let y = parseFloat(label.element.style.top);
                
                let newX = x + label.speedX;
                let newY = y + label.speedY;
                
                // Отскок от границ
                if (newX <= 0 || newX >= window.innerWidth - 100) {
                    label.speedX = -label.speedX;
                    randomizeLabel(label);
                    newX = Math.max(0, Math.min(window.innerWidth - 100, newX));
                }
                
                if (newY <= 0 || newY >= window.innerHeight - 100) {
                    label.speedY = -label.speedY;
                    randomizeLabel(label);
                    newY = Math.max(0, Math.min(window.innerHeight - 100, newY));
                }
                
                label.element.style.left = newX + 'px';
                label.element.style.top = newY + 'px';
                
                // Случайное изменение (10% шанс)
                if (Math.random() < 0.1) {
                    randomizeLabel(label);
                }
            }
            
            // Иногда добавляем новую надпись
            if (Math.random() < 0.1 && labels.length < 60) {
                createSingleLabel();
            }
            
            // Иногда удаляем старую
            if (Math.random() < 0.05 && labels.length > 15) {
                const old = labels.shift();
                old.element.remove();
            }
            
            animationId = requestAnimationFrame(animate);
        }
        
        function randomizeLabel(label) {
            const newSize = Math.floor(Math.random() * 90) + 20;
            const newFont = fonts[Math.floor(Math.random() * fonts.length)];
            const newColor = colors[Math.floor(Math.random() * colors.length)];
            
            label.element.style.fontSize = newSize + 'px';
            label.element.style.fontFamily = newFont;
            label.element.style.color = newColor;
            label.size = newSize;
            label.color = newColor;
            
            // Иногда меняем направление
            if (Math.random() < 0.3) {
                label.speedX = (Math.random() - 0.5) * 4;
                label.speedY = (Math.random() - 0.5) * 4;
            }
        }
        
        // Музыка с автовоспроизведением
        function setupMusic() {
            const audio = document.getElementById('bg-music');
            const btn = document.getElementById('music-control');
            
            // Функция обновления иконки кнопки
            function updateButtonIcon() {
                if (musicPlaying) {
                    btn.textContent = '🔊';
                } else {
                    btn.textContent = '🔇';
                }
            }
            
            // Функция запуска музыки (вызывается при попытке автовоспроизведения или по клику)
            function startMusic() {
                if (musicPlaying) return;
                
                audio.play().then(() => {
                    musicPlaying = true;
                    updateButtonIcon();
                    console.log('Автовоспроизведение успешно');
                }).catch(e => {
                    console.log('Автовоспроизведение заблокировано браузером:', e);
                    musicPlaying = false;
                    updateButtonIcon();
                    // Показываем подсказку пользователю
                    btn.style.animation = 'shake 0.5s ease-in-out';
                    setTimeout(() => { btn.style.animation = ''; }, 500);
                });
            }
            
            // Обработчик кнопки
            btn.addEventListener('click', () => {
                if (musicPlaying) {
                    audio.pause();
                    musicPlaying = false;
                    updateButtonIcon();
                } else {
                    audio.play().then(() => {
                        musicPlaying = true;
                        updateButtonIcon();
                    }).catch(e => {
                        console.log('Не удалось воспроизвести:', e);
                    });
                }
            });
            
            // Пытаемся воспроизвести сразу при загрузке страницы
            startMusic();
            
            // Также пробуем при любом касании экрана (политика автовоспроизведения в мобильных браузерах)
            const attemptAutoPlayOnTouch = () => {
                if (!musicPlaying) {
                    startMusic();
                }
                // Удаляем обработчик после первого касания, чтобы не мешать
                document.removeEventListener('touchstart', attemptAutoPlayOnTouch);
                document.removeEventListener('click', attemptAutoPlayOnTouch);
            };
            
            document.addEventListener('touchstart', attemptAutoPlayOnTouch);
            document.addEventListener('click', attemptAutoPlayOnTouch);
            
            // Проверяем наличие MP3 файла
            fetch('music.mp3', { method: 'HEAD' })
                .then(response => {
                    if (!response.ok) {
                        console.log('MP3 файл не найден, музыка не будет играть');
                        btn.style.display = 'none';
                        musicPlaying = false;
                    }
                })
                .catch(() => {
                    console.log('MP3 файл не найден');
                    btn.style.display = 'none';
                });
        }
        
        // Обработка изменения размера окна
        window.addEventListener('resize', () => {
            for (let label of labels) {
                let x = parseFloat(label.element.style.left);
                let y = parseFloat(label.element.style.top);
                x = Math.min(x, window.innerWidth - 100);
                y = Math.min(y, window.innerHeight - 100);
                label.element.style.left = x + 'px';
                label.element.style.top = y + 'px';
            }
        });
        
        // Запуск
        createCrazyLabels();
        animate();
        setupMusic();
    </script>
</body>
</html>
